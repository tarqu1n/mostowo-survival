name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages on every push to master.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer deploy cancel an in-flight one, but don't cancel a run mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test # Tier-1 unit gate (fast, no browser) — blocks a deploy on a logic regression
      - run: npm run build
        env:
          NODE_ENV: production
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
