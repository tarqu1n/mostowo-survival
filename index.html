<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-first: lock to device width, disable user zoom so touch controls feel native. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#14100f" />
    <!-- Empty favicon: avoids a stray 404 (real icon comes with the art pass). -->
    <link rel="icon" href="data:," />
    <title>Mostowo Survival</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #14100f;
        overflow: hidden;
        /* Stop iOS long-press/callout and text selection interfering with touch controls. */
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        overscroll-behavior: none;
      }
      #game {
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* respect mobile browser chrome */
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* DOM/React HUD overlay (plan 046) — floats above the Phaser canvas, same box as #game.
         pointer-events:none so empty HUD space falls through to the world; interactive controls
         opt back in with pointer-events:auto. Positioned here (not in hud.css) so the layout holds
         even before React mounts. */
      #hud-root {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
